services:
  postgres:
    image: postgres:16
    container_name: aegisflow-postgres
    restart: always

    environment:
      POSTGRES_DB: aegisflow
      POSTGRES_USER: aegisflow
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
