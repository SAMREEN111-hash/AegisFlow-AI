spring:
  application:
    name: aegisflow-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      pool-name: AegisFlowHikariPool
      maximum-pool-size: ${DATABASE_POOL_MAX_SIZE:10}
      minimum-idle: ${DATABASE_POOL_MIN_IDLE:2}
      connection-timeout: ${DATABASE_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DATABASE_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DATABASE_MAX_LIFETIME_MS:1800000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.aegisflow.api: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}

aegisflow:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      issuer: ${JWT_ISSUER:aegisflow-ai}
      secret: ${JWT_SECRET:replace_with_at_least_32_bytes_of_entropy}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
  integrations:
    ai-service:
      base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
