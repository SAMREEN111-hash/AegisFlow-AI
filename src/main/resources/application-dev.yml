spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aegisflow}
    username: ${DATABASE_USERNAME:aegisflow}
    password: ${DATABASE_PASSWORD:password}
  jpa:
    show-sql: ${ENABLE_SQL_LOGGING:false}
    properties:
      hibernate:
        format_sql: true

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.aegisflow.api: DEBUG

spring.jpa.properties.hibernate.jdbc.time_zone: Asia/Kolkata

spring.jpa.hibernate.ddl-auto: update
