spring:
  datasource:
    hikari:
      maximum-pool-size: ${DATABASE_POOL_MAX_SIZE:30}
      minimum-idle: ${DATABASE_POOL_MIN_IDLE:5}
  jpa:
    show-sql: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoint:
    health:
      show-details: never

logging:
  structured:
    format:
      console: logstash
  level:
    root: INFO
    com.aegisflow.api: INFO
    org.hibernate.SQL: WARN
